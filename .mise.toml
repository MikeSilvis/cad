[tools]
python = "3.12"

[tasks.setup]
description = "Create the virtualenv and install CAD workspace dependencies."
run = "python -m venv .venv && .venv/bin/python -m pip install --upgrade pip && .venv/bin/python -m pip install -e '.[dev]'"

[tasks.list]
description = "List available CAD models and their parameters."
run = ".venv/bin/cad list"

[tasks.build]
description = "Build every CAD model into exports/."
run = ".venv/bin/cad build all"

[tasks.projects]
description = "List configured CAD projects."
run = ".venv/bin/cad projects"

[tasks.package]
description = "Build committed artifacts for a configured project: mise run package -- <project-id>."
run = ".venv/bin/cad package"

[tasks.render]
description = "Build the standard final PNG render for a configured project: mise run render -- <project-id>."
run = ".venv/bin/cad render"

[tasks.inspect]
description = "Inspect a downloaded STL/STEP file: mise run inspect -- <file>."
run = ".venv/bin/cad inspect"

[tasks.import]
description = "Copy a downloaded STL/STEP file into a project as a reference: mise run import -- <file> <project-id>."
run = ".venv/bin/cad import"

[tasks.test]
description = "Run the Python test suite."
run = ".venv/bin/python -m pytest"

[tasks.validate]
description = "Run tests and build all CAD exports."
run = "mise run test && mise run build"
